[build]
buildCommand = "apt-get update -qq && apt-get install -y -qq curl git unzip && git clone https://github.com/decolua/9router.git /app/9router && cd /app/9router && cp .env.example .env && npm install && npm run build"

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/dashboard"
healthcheckTimeout = 30
