[build]
buildCommand = "apt-get update -qq && apt-get install -y -qq curl ca-certificates gnupg && curl -fsSL https://deb.nodesource.com/setup_22.x | bash - && apt-get install -y -qq nodejs && npm install -g 9router"

[deploy]
startCommand = "bash start.sh"
healthcheckPath = "/dashboard"
healthcheckTimeout = 30
